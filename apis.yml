aid: resy
url: https://raw.githubusercontent.com/api-evangelist/resy/refs/heads/main/apis.yml
name: Resy
kind: company
description: Resy is a restaurant reservation and discovery platform owned by American Express. Resy does
  not maintain a publicly self-serve developer portal; integration is restricted to approved partners
  (POS, CRM, loyalty, marketing, and discovery) under direct partnership agreements. The primary public
  surface is the consumer web and mobile app and an embeddable "Book with Resy" booking widget for
  restaurants. The unofficial internal client API at api.resy.com has been widely reverse-engineered by
  the community, but it is undocumented, unsupported, and may change without notice.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Hospitality
  - Reservations
  - Restaurants
  - Dining
  - Booking
created: '2026-05-08'
modified: '2026-06-03'
specificationVersion: '0.19'
apis:
  - aid: resy:partner-api
    name: Resy Partner API
    description: Partner-only REST API for reservations, availability, and restaurant metadata. Access is
      granted through Resy's partnerships team for approved POS, CRM, loyalty, and discovery integrations.
      No public developer portal or self-serve signup; no public OpenAPI specification is published.
    humanURL: https://resy.com/join/integrations/
    tags:
    - REST
    - Partner
    - Reservations
    properties:
    - type: Partners
      url: https://resy.com/join/integrations/
    - type: Contact
      url: mailto:api@resy.com
  - aid: resy:booking-widget
    name: Resy Booking Widget
    description: Embeddable "Book with Resy" booking button/widget that restaurants and partners can place
      on their own websites to drive reservations into Resy. This is the primary publicly available
      integration surface; it is a hosted widget rather than a documented programmatic API.
    humanURL: https://resy.com/join/integrations/
    tags:
    - Widget
    - Embed
    - Reservations
    properties:
    - type: Documentation
      url: https://helpdesk.resy.com/en_us/booking-button-installation-Skx_7ueNo
      title: Booking Button Installation
  - aid: resy:internal-web-api
    name: Resy Internal Web/Mobile API (Undocumented)
    description: Resy's web and mobile clients communicate with an internal API at api.resy.com. This API is
      not publicly documented or supported, requires credentials extracted from a logged-in session, and is
      subject to change without notice. The community has reverse-engineered it; the libraries referenced
      below are unofficial and not affiliated with or endorsed by Resy.
    humanURL: https://resy.com/
    baseURL: https://api.resy.com
    tags:
    - Internal
    - Undocumented
    - Mobile
    properties:
    - type: CodeExamples
      url: https://github.com/lgrees/resy-cli
      title: resy-cli (Community, Unofficial - Go)
    - type: CodeExamples
      url: https://github.com/jeffknaide/resy-bot
      title: resy-bot (Community, Unofficial - Python)
    - type: CodeExamples
      url: https://github.com/Alkaar/resy-booking-bot
      title: resy-booking-bot (Community, Unofficial - Scala)
